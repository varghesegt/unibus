spring.application.name=backend

spring.datasource.url=jdbc:h2:file:./data/unibusdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Prefix tables for Unibus
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT Secret (for development only)
jwt.secret=ThisIsASecretKeyForUnibusBackendDevelopmentOnlyDoNotUseInProduction12345!
jwt.expirationMs=86400000
